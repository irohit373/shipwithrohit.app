name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            nvm use 20

            cd ${{ secrets.APP_DIR }}
            git pull origin main
            npm ci
            npm run build

            if pm2 describe shipwithrohit > /dev/null; then
              pm2 reload shipwithrohit
            else
              pm2 start npm --name "shipwithrohit" -- start
            fi

            pm2 save
